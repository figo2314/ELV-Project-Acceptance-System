services:
  postgres:
    image: postgres:16-alpine
    container_name: elv-acceptance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: elv_acceptance
      POSTGRES_USER: elv_acceptance
      POSTGRES_PASSWORD: elv_acceptance_dev
    ports:
      - "5432:5432"
    volumes:
      - elv_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elv_acceptance -d elv_acceptance"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  elv_postgres_data:
